name: Päivitä Runbook Confluenceen

on:
  push:
    paths:
      - 'runbook.md'
  workflow_dispatch:

jobs:
  sync-confluence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Luo confluence_config.json
        env:
          CONFLUENCE_BASE_URL:  ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL:     ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
        run: |
          python3 - << 'EOF'
          import os, json
          cfg = {
            "base_url":   os.environ["CONFLUENCE_BASE_URL"].rstrip("/"),
            "email":      os.environ["CONFLUENCE_EMAIL"],
            "api_token":  os.environ["CONFLUENCE_API_TOKEN"],
            "space_key":  os.environ["CONFLUENCE_SPACE_KEY"],
            "page_title": "Matikka-Ahmatti Runbook",
          }
          with open("confluence_config.json", "w") as f:
              json.dump(cfg, f)
          # Tulosta config ilman sensitiivisiä tietoja
          print(f"base_url:  {cfg['base_url']}")
          print(f"email:     {cfg['email']}")
          print(f"space_key: {cfg['space_key']}")
          print(f"api_token: {'*' * 8 + cfg['api_token'][-4:]}")
          EOF

      - name: Tarkista tiedostot
        run: |
          echo "=== Tiedostot ==="
          ls -la confluence_sync.py runbook.md confluence_config.json
          echo ""
          echo "=== confluence_sync.py versio (rivi 1-5) ==="
          head -5 confluence_sync.py

      - name: Testaa Confluence-yhteys
        env:
          CONFLUENCE_BASE_URL:  ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL:     ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
        run: |
          python3 - << 'EOF'
          import os, base64, urllib.request, urllib.error, json
          base  = os.environ["CONFLUENCE_BASE_URL"].rstrip("/")
          email = os.environ["CONFLUENCE_EMAIL"]
          token = os.environ["CONFLUENCE_API_TOKEN"]
          space = os.environ["CONFLUENCE_SPACE_KEY"]
          creds = base64.b64encode(f"{email}:{token}".encode()).decode()
          headers = {"Authorization": f"Basic {creds}", "Accept": "application/json"}
          # Testaa space
          url = f"{base}/wiki/rest/api/space/{space}"
          req = urllib.request.Request(url, headers=headers)
          try:
              with urllib.request.urlopen(req) as r:
                  data = json.loads(r.read())
                  print(f"✅ Space löytyi: {data.get('name')} (key: {data.get('key')})")
          except urllib.error.HTTPError as e:
              print(f"❌ Space HTTP {e.code}: {e.read().decode()[:300]}")
              import sys; sys.exit(1)
          EOF

      - name: Synkronoi Confluenceen
        env:
          CONFLUENCE_BASE_URL:  ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL:     ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
        run: |
          python3 - << 'EOF'
          import os, sys, json, re, base64
          import urllib.request, urllib.error, urllib.parse

          base  = os.environ["CONFLUENCE_BASE_URL"].rstrip("/")
          email = os.environ["CONFLUENCE_EMAIL"]
          token = os.environ["CONFLUENCE_API_TOKEN"]
          space = os.environ["CONFLUENCE_SPACE_KEY"]
          title = "Matikka-Ahmatti Runbook"

          creds   = base64.b64encode(f"{email}:{token}".encode()).decode()
          headers = {
              "Authorization": f"Basic {creds}",
              "Content-Type":  "application/json",
              "Accept":        "application/json",
          }

          def req(method, url, data=None):
              body = json.dumps(data).encode() if data else None
              r = urllib.request.Request(url, data=body, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(r) as resp:
                      return resp.status, json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode()

          # Lue runbook
          with open("runbook.md", encoding="utf-8") as f:
              md = f.read()
          print(f"📄 Runbook luettu ({len(md)} merkkiä)")

          # Yksinkertainen markdown → HTML
          def md2html(md):
              out = []
              for line in md.split("\n"):
                  m = re.match(r"^(#{1,6})\s+(.+)", line)
                  if m:
                      l = len(m.group(1))
                      out.append(f"<h{l}>{m.group(2)}</h{l}>")
                  elif line.startswith("```"):
                      pass  # skip code fences
                  elif line.startswith("|"):
                      out.append(f"<p>{line}</p>")
                  elif line.strip():
                      line = re.sub(r"\*\*(.+?)\*\*", r"<strong>\1</strong>", line)
                      line = re.sub(r"`([^`]+)`", r"<code>\1</code>", line)
                      out.append(f"<p>{line}</p>")
              return "\n".join(out)

          body_html = md2html(md)
          print("🔀 Muunnettu HTML-formaattiin")

          # Hae olemassa oleva sivu
          url = (f"{base}/wiki/rest/api/content"
                 f"?spaceKey={urllib.parse.quote(space)}"
                 f"&title={urllib.parse.quote(title)}"
                 f"&expand=version&limit=1")
          status, res = req("GET", url)
          print(f"🔍 Haku: HTTP {status}")

          if status == 200 and isinstance(res, dict) and res.get("results"):
              # Päivitä
              page    = res["results"][0]
              page_id = page["id"]
              version = page["version"]["number"]
              print(f"✏️  Päivitetään sivu ID={page_id} v{version}→{version+1}")
              update_url = f"{base}/wiki/rest/api/content/{page_id}"
              s2, r2 = req("PUT", update_url, {
                  "type": "page", "title": title,
                  "version": {"number": version + 1},
                  "body": {"storage": {"value": body_html, "representation": "storage"}},
              })
              if s2 in (200, 201):
                  pid = r2.get("id") if isinstance(r2, dict) else "?"
                  print(f"✅ Päivitetty! {base}/wiki/spaces/{space}/pages/{pid}")
              else:
                  print(f"❌ Päivitys epäonnistui HTTP {s2}: {str(r2)[:300]}")
                  sys.exit(1)
          else:
              # Luo uusi
              print(f"✨ Luodaan uusi sivu spaceen {space}...")
              s2, r2 = req("POST", f"{base}/wiki/rest/api/content", {
                  "type": "page", "title": title,
                  "space": {"key": space},
                  "body": {"storage": {"value": body_html, "representation": "storage"}},
              })
              if s2 in (200, 201):
                  pid = r2.get("id") if isinstance(r2, dict) else "?"
                  print(f"✅ Luotu! {base}/wiki/spaces/{space}/pages/{pid}")
              else:
                  print(f"❌ Luonti epäonnistui HTTP {s2}: {str(r2)[:400]}")
                  sys.exit(1)
          EOF
